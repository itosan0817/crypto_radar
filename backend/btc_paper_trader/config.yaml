use_runtime_params: true
symbol: BTCUSDT
base_url: https://fapi.binance.com

intervals:
  signal: 15m
  features:
    - 15m
    - 1h
    - 4h
    - 1d

data:
  cache_sqlite: data/btc_klines.sqlite

regression:
  lookback_bars:
    m15: 96
    "1h": 72
    "4h": 60
    "1d": 60

pattern:
  window: 32
  top_k: 12
  min_similarity: 0.15
  horizon_bars: 4

model:
  forward_bars: 4
  train_min_samples: 100
  calibration: platt

combine:
  weight_model: 0.55
  weight_pattern: 0.45
  # エントリー頻度を上げる（ペーパー向けに緩め）
  entry_threshold: 0.11

filters:
  enabled: true
  min_confidence: 0.09
  mtf_align_1h: false
  mtf_align_4h: false
  agreement_required: false
  atr_period: 14
  atr_low_quantile: 0.05
  atr_high_quantile: 0.97
  # 低ボラ時の手数料比較で落とされやすいためペーパーでは緩める
  expectancy_gate: false
  taker_fee_rate: 0.0004
  slippage_bps: 2.0
  funding_filter_enabled: true
  # score補正の強さ。大きいほど正Funding時にロングを抑え、負Funding時にショートを抑える。
  funding_score_weight: 0.35
  # hard block 閾値（1回のFunding率）。例 0.00025 = 0.025%
  funding_long_block_above: 0.00025
  funding_short_block_below: -0.00025

risk:
  tp_atr_mult: 1.8
  sl_atr_mult: 1.2
  max_hold_bars: 48
  position_fraction: 0.98
  max_daily_loss_pct: 0.05
  cooldown_after_losses: 3
  cooldown_bars: 8
  # 0 = off. After favorable move of this many ATRs, move stop to breakeven (entry).
  trail_breakeven_atr_mult: 0.0
  # 0 = off. Partial take profit at entry +/- this ATR multiple.
  partial_take_profit_atr_mult: 1.0
  # Fraction of current position to close when partial TP is hit.
  partial_take_profit_fraction: 0.5
  # Move stop loss to entry after partial TP.
  partial_take_profit_move_sl_to_be: true
  # 0 = off. ATR trailing stop activated after partial TP.
  trail_after_partial_atr_mult: 1.2
  confidence_tier:
    enabled: true
    # conf <= thresholds[i] uses row i (first match). Tiers from low to high conf.
    thresholds: [0.18, 0.28, 1.01]
    position_fraction: [0.4, 0.7, 0.98]
    tp_atr_mult_scale: [0.95, 1.0, 1.05]
    sl_atr_mult_scale: [1.05, 1.0, 0.95]
    max_hold_bars_scale: [0.85, 1.0, 1.0]

backtest:
  initial_quote: 10000.0
  funding_rate_per_8h: 0.0

walk_forward:
  train_bars: 8000
  test_bars: 1500
  embargo_bars: 500
  step_bars: 1500
  grid:
    tp_atr_mult: [1.4, 1.8, 2.2]
    sl_atr_mult: [1.0, 1.2, 1.5]
    weight_model: [0.45, 0.55, 0.65]
    entry_threshold: [0.14, 0.18, 0.22]
    min_confidence: [0.08, 0.12, 0.16]

paper:
  poll_seconds: 30
  timezone: Asia/Tokyo
  train_window_bars: 5000
  state_path: data/paper_state.json
  reload_runtime_params_seconds: 300

tune:
  min_test_trades: 5
  min_profit_factor: 0.0
  skip_if_worse_than_current: true
  score_weights:
    pnl: 1.0
    drawdown_penalty: 0.5
    profit_factor_bonus: 50.0

runtime_guard:
  min_trades: 8
  min_profit_factor: 1.05
  min_win_rate: 0.45
  min_expectancy: 0.0

regime:
  enabled: true
  # |slope| がこの値以下なら方向感が弱いとみなす
  max_abs_slope_1h: 0.0016
  max_abs_slope_4h: 0.0010
  # 低ボラ時のみレンジ扱い
  max_atr_ratio: 0.0045
  range_breakout_guard:
    enabled: true
    # 現在ATR比率が基準(quantile)の何倍以上ならレンジ停止するか
    spike_multiple: 1.8
    baseline_quantile: 0.5
    min_hist_bars: 40
    min_abs_atr_ratio: 0.003

grid:
  enabled: true
  # レンジ中心は15m終値EMA
  center_ema_window: 48
  # 中心からこのATR倍率を超えたら逆張りエントリー
  step_atr_mult: 0.6
  # 中心付近はノートレード
  deadband_atr_mult: 0.2

entry_timing_1m:
  enabled: true
  # 1分足の細かい条件はトレンドのみ（レンジはグリッド判定後、次足成行で入る）
  only_regimes:
    - trend
  ema_fast: 9
  ema_slow: 21
  rsi_period: 14
  breakout_lookback_bars: 3
  trend:
    breakout_buffer_bps: 8.0
  range:
    rsi_overbought: 52
    rsi_oversold: 48

news_filter:
  enabled: true
  live_sync:
    enabled: true
    calendar_url: https://nfs.faireconomy.media/ff_calendar_thisweek.json
    refresh_seconds: 900
    request_timeout_seconds: 8
    # 過去バー（backtest領域）ではライブ同期せず、固定枠にフォールバック
    max_bar_age_hours_for_sync: 72
    impacts: [High]
    countries: [USD]
    block_before_min: 15
    block_after_min: 20
  # UTC基準の定期ウィンドウ（高インパクトイベント対策）
  windows_utc:
    # 米CPI目安: 毎月中旬の発表時間帯に近い枠（曜日固定が難しいので毎平日同時刻をガード）
    - weekday_utc: 0
      hour_utc: 12
      minute_utc: 30
      block_before_min: 20
      block_after_min: 40
    - weekday_utc: 1
      hour_utc: 12
      minute_utc: 30
      block_before_min: 20
      block_after_min: 40
    - weekday_utc: 2
      hour_utc: 12
      minute_utc: 30
      block_before_min: 20
      block_after_min: 40
    - weekday_utc: 3
      hour_utc: 12
      minute_utc: 30
      block_before_min: 20
      block_after_min: 40
    - weekday_utc: 4
      hour_utc: 12
      minute_utc: 30
      block_before_min: 20
      block_after_min: 40
    # FOMC目安（日本時間深夜に相当するUTC枠）
    - weekday_utc: 2
      hour_utc: 18
      minute_utc: 0
      block_before_min: 30
      block_after_min: 90

# `python -m btc_paper_trader tune` が data/runtime_params.json を上書き。
# 次回起動時 load_config が risk / combine / filters をマージする。

logging:
  jsonl_path: data/paper_events.jsonl
